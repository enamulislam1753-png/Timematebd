<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TimeMate BD</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3602/3602145.png" />
    <script>
      // Automatic recovery for stale Service Worker cache or script 404 deadlocks
      window.addEventListener('error', function(e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          console.warn('Asset loading failed, clearing SW cache & reloading:', e.target.src || e.target.href);
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for (var r of registrations) { r.unregister(); }
              if (typeof caches !== 'undefined') {
                caches.keys().then(function(keys) {
                  keys.forEach(function(key) { caches.delete(key); });
                  window.location.reload();
                });
              } else {
                window.location.reload();
              }
            });
          }
        }
      }, true);
    </script>
  </head>
  <body style="margin: 0; background-color: #020211; color: #ffffff; font-family: system-ui, -apple-system, sans-serif;">
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; background-color: #020211; color: #ffffff;">
        <div style="position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
          <div style="width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #a855f7); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(99, 102, 241, 0.5);">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: white;">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </div>
        </div>
        <h1 style="font-size: 22px; font-weight: 800; margin: 0 0 6px 0; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">TimeMate BD</h1>
        <p style="font-size: 13px; color: #94a3b8; margin: 0; font-weight: 500;">দ্রুত সংযোগ স্থাপন করা হচ্ছে...</p>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
